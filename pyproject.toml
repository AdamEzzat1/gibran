[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rumi"
version = "0.0.1"
description = "Governed analytics + NL-to-SQL over DuckDB."
requires-python = ">=3.11"
dependencies = [
    "duckdb>=1.0",
    "pyyaml>=6.0",
    "typer>=0.12",
    "pyjwt[crypto]>=2.8",
    "pydantic>=2.0",
    "sqlglot>=23",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
rumi = "rumi.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/rumi"]
