sources:
  - id: orders
    display_name: Orders
    type: duckdb_table
    uri: orders
    primary_grain: order_id
    columns:
      - name: order_id
        type: VARCHAR
        sensitivity: public
      - name: amount
        type: DECIMAL(18,2)
        sensitivity: public
      - name: order_date
        type: TIMESTAMP
        sensitivity: public
      - name: status
        type: VARCHAR
        sensitivity: public
      - name: region
        type: VARCHAR
        sensitivity: public
      - name: customer_email
        type: VARCHAR
        sensitivity: pii
    dimensions:
      - id: orders.region
        column: region
        display_name: Region
        type: categorical
      - id: orders.order_date
        column: order_date
        display_name: Order Date
        type: temporal

metrics:
  - id: order_count
    source: orders
    display_name: Order Count
    type: count
    description: Total number of orders.
  - id: gross_revenue
    source: orders
    display_name: Gross Revenue
    type: sum
    expression: amount
    filter: status = 'paid'
    unit: USD
    description: Sum of paid order amounts.
  - id: avg_order_value
    source: orders
    display_name: Average Order Value
    type: ratio
    numerator: gross_revenue
    denominator: order_count
    unit: USD
    description: Gross revenue per order.
  - id: revenue_per_paid_order
    source: orders
    display_name: Revenue Per Paid Order
    type: expression
    expression: "{gross_revenue} / NULLIF({order_count}, 0)"
    unit: USD
    description: Equivalent to avg_order_value but defined via expression template.
  - id: p95_amount
    source: orders
    display_name: P95 Order Amount
    type: percentile
    column: amount
    p: 0.95
    unit: USD
    description: 95th percentile of order amount across all rows.
  - id: revenue_7d_rolling
    source: orders
    display_name: 7-Day Rolling Revenue
    type: rolling_window
    aggregate: sum
    column: amount
    window: "7 days"
    order_by_column: order_date
    filter: status = 'paid'
    unit: USD
    description: Rolling sum of paid order amounts over the trailing 7 days.
  - id: revenue_mom
    source: orders
    display_name: Revenue Month-over-Month
    type: period_over_period
    base_metric: gross_revenue
    period_dim: orders.order_date
    period_unit: month
    comparison: delta
    unit: USD
    description: Change in gross revenue compared to the prior month.
  - id: customer_retention
    source: orders
    display_name: Customer Retention
    type: cohort_retention
    entity_column: customer_email
    event_column: order_date
    cohort_grain: month
    retention_grain: month
    max_periods: 12
    description: Monthly retention -- of customers first ordering in month N, what fraction return in subsequent months.
  - id: paid_funnel
    source: orders
    display_name: Order -> Paid Funnel
    type: funnel
    funnel_entity_column: customer_email
    funnel_event_order_column: order_date
    funnel_steps:
      - name: ordered
        condition: status IN ('pending', 'paid')
      - name: paid
        condition: status = 'paid'
    description: Two-step funnel -- ordered, then paid.
  # Phase 3 NL fixture additions: simple aggregates covering the
  # type-keyword patterns (unique / max / min / avg / median / first / last).
  - id: unique_customers
    source: orders
    display_name: Unique Customers
    type: count_distinct
    column: customer_email
    description: Distinct customer count.
  - id: avg_amount
    source: orders
    display_name: Average Order Amount
    type: avg
    expression: amount
    unit: USD
    description: Mean order amount.
  - id: max_amount
    source: orders
    display_name: Max Order Amount
    type: max
    expression: amount
    unit: USD
    description: Largest single order amount.
  - id: min_amount
    source: orders
    display_name: Min Order Amount
    type: min
    expression: amount
    unit: USD
    description: Smallest single order amount.
  - id: median_amount
    source: orders
    display_name: Median Order Amount
    type: median
    column: amount
    unit: USD
    description: Median order amount.
  - id: first_amount
    source: orders
    display_name: First Order Amount
    type: first_value
    column: amount
    unit: USD
    description: First order amount by scan order.
  - id: last_amount
    source: orders
    display_name: Last Order Amount
    type: last_value
    column: amount
    unit: USD
    description: Last order amount by scan order.

roles:
  - id: analyst_west
    display_name: West Region Analyst
    attributes:
      region: west
  - id: external_partner
    display_name: External Partner
    attributes: {}

policies:
  - id: analyst_west_orders
    role: analyst_west
    source: orders
    default_column_mode: allow
    row_filter:
      op: eq
      column: region
      value:
        $attr: region
  - id: external_partner_orders
    role: external_partner
    source: orders
    default_column_mode: deny
    column_overrides:
      order_id: allow
      amount: allow
      order_date: allow
    row_filter:
      op: eq
      column: region
      value: west

quality_rules:
  - id: orders_amount_not_null
    source: orders
    type: not_null
    config:
      column: amount
    severity: block
  - id: orders_amount_range
    source: orders
    type: range
    config:
      column: amount
      min: 0
      max: 1000000
    severity: warn

freshness_rules:
  - id: orders_freshness_24h
    source: orders
    watermark_column: order_date
    max_age_seconds: 86400
    severity: block
